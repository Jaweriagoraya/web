<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daraz Clone Landing Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">Daraz</div>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Categories</a></li>
        <li><a href="#">Deals</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <div class="search-bar">
      <input type="text" placeholder="Search products...">
      <button>Search</button>
    </div>
  </header>

  <!-- Hero Banner -->
  <section class="hero">
    <img src="images/banner.jpg" alt="Daraz Banner">
    <div class="hero-text">
      <h1>Big Sale on Electronics!</h1>
      <p>Up to 50% off on selected items</p>
      <button>Shop Now</button>
    </div>
  </section>

  <!-- Categories -->
  <section class="categories">
    <h2>Shop by Category</h2>
    <div class="category-grid">
      <div class="category">Electronics</div>
      <div class="category">Fashion</div>
      <div class="category">Home & Living</div>
      <div class="category">Beauty</div>
    </div>
  </section>

  <!-- Featured Products -->
  <section class="products">
    <h2>Featured Products</h2>
    <div class="product-grid">
      <div class="product">
        <img src="images/product1.jpg" alt="Smartphone">
        <h3>Smartphone</h3>
        <p>$299</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="images/product2.jpg" alt="Headphones">
        <h3>Headphones</h3>
        <p>$99</p>
        <button>Add to Cart</button>
      </div>
      <div class="product">
        <img src="images/product3.jpg" alt="Shoes">
        <h3>Running Shoes</h3>
        <p>$59</p>
        <button>Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Daraz Clone. All rights reserved.</p>
  </footer>

</body>
</html>
