<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Portal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">HavenWorks</div>
    <input type="search" placeholder="Search news...">
    <nav>
      <ul>
        <li>Home</li>
        <li>Politics</li>
        <li>World</li>
        <li>Opinion</li>
        <li>Media</li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <img src="featured.jpg" alt="Featured story">
      <h1>Featured Headline</h1>
      <p>Short summary of the main story...</p>
    </section>

    <section class="news-grid">
      <article>
        <h2>News Headline</h2>
        <p>Brief description...</p>
      </article>
      <article>
        <h2>Another Headline</h2>
        <p>Brief description...</p>
      </article>
    </section>

    <aside>
      <h3>Trending Topics</h3>
      <ul>
        <li>War Crimes</li>
        <li>Intelligence</li>
        <li>Economy</li>
      </ul>
    </aside>
  </main>

  <footer>
    <p>&copy; 2026 HavenWorks. All rights reserved.</p>
  </footer>
</body>
</html>
